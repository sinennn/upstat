
services:
  upstat_backend:
    build: ./api/common
    ports:
      - "8080:8080"
    env_file:
      - ./api/common/.env
    environment:
      - INSIGHT_SERVICE_URL=http://reliability-service:8000
      - INSIGHT_SERVICE_GRPC_ADDRESS=reliability-service:50051
      - WATCHFILES_FORCE_POLLING=true 
    networks:
      - mynetwork

  reliability_service:
    build: ./reliability-service
    ports:
      - "8000:8000"
      - "50051:50051"
    env_file:
      - ./api/common/.env
      - ./reliability-service/.env
    environment:
      - UPSTAT_GRPC_ADDRESS=upstat_backend:8080
      - UPSTAT_GRPC_AUTH_TOKEN=${UPSTAT_GRPC_AUTH_TOKEN}
      - UPSTAT_GRPC_CHECK_LIMIT=50
      - GRPC_PORT=50051
    depends_on:
      - upstat_backend
    networks:
      mynetwork:
        aliases:
          - reliability-service

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8081:8081"
      - "9901:9901"
    volumes:
      - ./deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - upstat_backend
    networks:
      - mynetwork

  app-frontend:
    # Temporarily disabled - no Dockerfile in ./App yet
    # To re-enable: create ./App/Dockerfile with Next.js build config
    profiles:
      - disabled

networks:
  mynetwork:
    driver: bridge
