
services:
  upstat_backend:
    build: ./api/common
    ports:
      - "8080:8080"
    env_file:
      - ./api/common/.env
    networks:
      - mynetwork

  reliability_service:
    build: ./reliability-service
    ports:
      - "8000:8000"
    environment:
      - UPSTAT_GRPC_ADDRESS=upstat_backend:8080
      - UPSTAT_GRPC_AUTH_TOKEN=
      - UPSTAT_GRPC_CHECK_LIMIT=50
    depends_on:
      - upstat_backend
    networks:
      - mynetwork

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8081:8081"
      - "9901:9901"
    volumes:
      - ./deploy/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - upstat_backend
    networks:
      - mynetwork

  app-frontend:
    # Temporarily disabled - no Dockerfile in ./App yet
    # To re-enable: create ./App/Dockerfile with Next.js build config
    profiles:
      - disabled

networks:
  mynetwork:
    driver: bridge
